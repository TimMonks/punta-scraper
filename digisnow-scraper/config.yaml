name: DigiSnow Ski Station Scraper
version: "1.4.0"
slug: digisnow-scraper
description: Scrapes ski lift/slope status from DigiSnow-powered resorts and publishes to Home Assistant via MQTT
url: https://github.com/TimMonks/punta-scraper
image: ghcr.io/timmonks/punta-scraper
arch:
  - amd64
  - aarch64
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Web UI
map:
  - config:rw
options:
  stations:
    - valfrejus
schema:
  stations:
    - str
ingress: true
ingress_port: 8099
panel_icon: mdi:ski
panel_title: DigiSnow
panel_admin: false
services:
  - mqtt:need
startup: application
init: false
