services:
  digisnow-scraper:
    image: ghcr.io/timmonks/punta-scraper:${APP_IMAGE_TAG:-latest}
    build: .
    container_name: digisnow-scraper
    restart: unless-stopped
    expose:
      - "8099"
    volumes:
      - ./data:/app/app/data
    environment:
      - HA_MQTT_HOST=${HA_MQTT_HOST:-}
      - HA_MQTT_PORT=${HA_MQTT_PORT:-1883}
      - HA_MQTT_USERNAME=${HA_MQTT_USERNAME:-}
      - HA_MQTT_PASSWORD=${HA_MQTT_PASSWORD:-}
      - SECRET_KEY=${SECRET_KEY:-}
      - TZ=${TZ:-Europe/Paris}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-}
      - OIDC_END_SESSION_URL=${OIDC_END_SESSION_URL:-}
      - OIDC_ADMIN_GROUP=${OIDC_ADMIN_GROUP:-authentik Admins}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - web

networks:
  web:
    external: true
