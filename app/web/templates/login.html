{% extends "base.html" %}
{% block title %}Login - DigiSnow Scraper{% endblock %}
{% block content %}
<div class="login-container">
    <h1>DigiSnow Scraper</h1>
    <div class="login-form">
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <a href="{{ url_for('oidc.oidc_login') }}" class="btn btn-primary btn-oidc">Login with Authentik</a>
    </div>
</div>
{% endblock %}
